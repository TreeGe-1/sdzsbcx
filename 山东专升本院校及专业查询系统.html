<!DOCTYPE html>

                extend: {

            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;

<body class="min-h-screen">

<!-- ====================================================================================== -->

<!-- 顶部Logo区域（替换成你的公众号Logo） -->
<div class="bg-primary text-white py-4 shadow-md text-center">
    <img class="h-14 mx-auto" src="https://xxx你的公众号logo.png" alt="公众号Logo">
    <h1 class="text-2xl font-bold mt-2">山东专升本2026查询系统</h1>
</div>

<main class="max-w-2xl mx-auto p-4">
    <!-- 搜索+筛选区域 -->
    <div class="bg-white rounded-xl shadow-lg p-6 mt-4">
        <h2 class="text-center text-xl font-semibold text-gray-800 mb-4">专科专业→本科专业一键匹配</h2>
        <div class="relative">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="输入专科专业/代码（如：计算机应用技术/510201）" 
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
                oninput="handleSearch(this.value)"
                onfocus="handleSearch(this.value)"
            >
            <button onclick="clearInput()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <i class="fa fa-times-circle text-xl"></i>
            </button>
            <div id="searchDropdown" class="absolute left-0 right-0 mt-1 bg-white border rounded-lg shadow-lg z-10 hidden search-dropdown"></div>
        </div>

        <!-- 筛选：公办/民办+分数推荐 -->
        <div class="flex flex-wrap gap-2 mt-4">
            <select id="typeFilter" class="flex-1 border rounded-lg px-3 py-2">
                <option value="all">全部院校</option>
                <option value="公办">仅公办</option>
                <option value="民办">仅民办</option>
            </select>
            <input type="number" id="scoreInput" placeholder="输入预估分数" class="flex-1 border rounded-lg px-3 py-2">
        </div>

        <button onclick="doQuery()" class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-primary/90 transition mt-5 text-lg">
            查询并智能推荐
        </button>
    </div>

    <!-- 本科专业结果列表 -->
    <div id="resultList" class="bg-white rounded-xl shadow-lg p-6 mt-5 hidden">
        <h3 class="font-bold text-lg text-gray-800 mb-4 border-b pb-2">可报考本科专业（含考试科目）</h3>
        <div id="benkeList" class="space-y-4"></div>
    </div>

    <!-- 底部说明 -->
    <div class="bg-white rounded-xl shadow-lg p-5 mt-5 text-sm text-gray-600">
        <p>数据来源：山东省教育厅2026年专升本招生计划及专业对照目录。2026年分数线暂未公布，待官方发布后更新。</p>
    </div>
</main>

<!-- 院校详情弹窗 -->
<div id="detailModal" class="fixed inset-0 modal-overlay z-20 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800"></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa fa-times-circle text-2xl"></i></button>
            </div>
            <div id="modalContent" class="space-y-3"></div>
        </div>
    </div>
</div>

<script>
// 联想搜索
function handleSearch(keyword) {
    const dropdown=document.getElementById("searchDropdown");
    dropdown.innerHTML="";
    if (!keyword.trim()) { dropdown.classList.add("hidden"); return; }
    const filtered=majorList.filter(m=>m.name.includes(keyword)||m.id.includes(keyword));
    if (filtered.length===0) { dropdown.classList.add("hidden"); return; }
    filtered.forEach(m=>{
        const item=document.createElement("div");
        item.className="px-4 py-3 hover:bg-gray-100 cursor-pointer";
        item.innerHTML=`${m.name}[${m.id}]`;
        item.onclick=()=>{document.getElementById("searchInput").value=m.name; dropdown.classList.add("hidden");};
        dropdown.appendChild(item);
    });
    dropdown.classList.remove("hidden");
}

// 清空输入
function clearInput() {
    document.getElementById("searchInput").value="";
    document.getElementById("searchDropdown").classList.add("hidden");
}

// 查询+筛选+智能推荐
function doQuery() {
    const input=document.getElementById("searchInput").value.trim();
    const type=document.getElementById("typeFilter").value;
    const score=parseInt(document.getElementById("scoreInput").value)||0;
    if (!input) { alert("请输入或选择专科专业"); return; }

    const zhuanMajor=majorList.find(m=>m.name===input||m.id===input);
    if (!zhuanMajor) { alert("未找到对应专业"); return; }

    const benkeNames=zhuanToBenke[zhuanMajor.name]||[];
    if (benkeNames.length===0) { alert("暂无对应本科专业数据"); return; }

    const resultList=document.getElementById("resultList");
    const benkeListEl=document.getElementById("benkeList");
    benkeListEl.innerHTML="";

    benkeNames.forEach(bkName=>{
        const bkData=benkeData[bkName];
        // 筛选公办/民办
        let schools=bkData.schools;
        if (type!=="all") schools=schools.filter(s=>s.type===type);
        // 分数智能推荐：冲/稳/保
        schools=schools.map(s=>{
            let level="";
            if (score>=s.score25+20) level="冲";
            else if (score>=s.score25-10) level="稳";
            else level="保";
            return {...s,level};
        });

        const div=document.createElement("div");
        div.className="border-b pb-3";
        div.innerHTML=`
            <div class="flex justify-between items-center">
                <div>
                    <p class="font-semibold text-gray-800">${bkName}</p>
                    <p class="text-sm text-gray-500">考试科目：${bkData.math}</p>
                </div>
                <button onclick='showDetail("${bkName}","${type}","${score}")' class="text-primary font-medium hover:underline">查看院校 &gt;</button>
            </div>
        `;
        benkeListEl.appendChild(div);
    });

    resultList.classList.remove("hidden");
}

// 显示院校详情（含冲稳保标签）
function showDetail(bkName,type,score) {
    const bkData=benkeData[bkName];
    const modal=document.getElementById("detailModal");
    const modalTitle=document.getElementById("modalTitle");
    const modalContent=document.getElementById("modalContent");

    modalTitle.textContent=bkName;
    modalContent.innerHTML=`
        <div class="grid grid-cols-6 gap-2 text-center text-sm text-gray-500 border-b pb-2">
            <span>院校</span><span>性质</span><span>26计划</span><span>25线</span><span>24线</span><span>推荐</span>
        </div>
    `;

    let schools=bkData.schools;
    if (type!=="all") schools=schools.filter(s=>s.type===type);

    schools.forEach(s=>{
        let level="";
        if (score>=s.score25+20) level="<span class='text-red-500 font-bold'>冲</span>";
        else if (score>=s.score25-10) level="<span class='text-green-500 font-bold'>稳</span>";
        else level="<span class='text-blue-500 font-bold'>保</span>";

        modalContent.innerHTML+=`
            <div class="grid grid-cols-6 gap-2 items-center text-center py-2">
                <div class="text-left">${s.name}</div>
                <span class="tag ${s.type==='公办'?'bg-public':'bg-private'}">${s.type}</span>
                <span>${s.plan26}</span>
                <span>${s.score25}</span>
                <span>${s.score24}</span>
                <span>${level}</span>
            </div>
        `;
    });

    modal.classList.remove("hidden");
}

// 关闭弹窗
function closeModal() { document.getElementById("detailModal").classList.add("hidden"); }
document.getElementById("detailModal").addEventListener("click",e=>{if (e.target===this) closeModal();});
</script>

</body>
</html>
